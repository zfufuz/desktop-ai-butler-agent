name: CI

on:
  push:
  pull_request:

jobs:
  desktop-full:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop-full

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop-full/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test Agent runtime
        run: npm test

      - name: Build renderer
        run: npm run build

      - name: Build Electron main process
        run: npm run build:electron
